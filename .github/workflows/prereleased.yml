name: 🚀 Pre-release

on:
    release:
        types: [ prereleased ]

env:
    RELEASE_VERSION: ${{ github.event.release.tag_name }}

jobs:
    publish:
        name: 🚀 Build and pre-release
        runs-on: ubuntu-latest
        permissions:
            contents: read
            deployments: write
        steps:
            -   name: 👀 Checkout
                uses: actions/checkout@v6

            -   name: ⚙️ Setup Node.js
                uses: actions/setup-node@v4
                with:
                    node-version: 22

            -   name: ⚙️ Setup Bun
                uses: oven-sh/setup-bun@v2

            -   name: 📦️ Install dependencies
                run: bun install --frozen-lockfile

            -   name: ✏️ Tag v${{ env.RELEASE_VERSION }}
                run: |
                    sed -i 's/0.0.0/${{ env.RELEASE_VERSION }}/g' package.json

            -   name: 🔨 Build Patat
                run: bun run build

            -   name: 🚀 Deploy pre-release v${{ env.RELEASE_VERSION }}
                id: deploy
                uses: cloudflare/wrangler-action@v3
                with:
                    accountId: 5e565cf9fa55b0eae1f8131903da2ca9
                    apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
                    command: versions upload --tag staging
                    gitHubToken: ${{ secrets.GITHUB_TOKEN }}
                    wranglerVersion: "4.90.1"
